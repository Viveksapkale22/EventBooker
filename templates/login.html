<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} shadow-sm">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0 fw-bold">User Login</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 fw-bold shadow-sm">Login</button>
                    </form>
                    <div class="mt-4 text-center">
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Need an account? Register.</a><br>
                        <a href="/" class="text-muted text-decoration-none small mt-2 d-inline-block">← Back to Events</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
