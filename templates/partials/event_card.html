<div class="col">
    <div class="card h-100 shadow-sm border-0 bg-light">
        <img src="{{ event.image_url }}" class="card-img-top" style="height: 140px; object-fit: cover;">
        <div class="card-body p-3 d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-1">
                <h6 class="card-title fw-bold text-truncate mb-0" style="max-width: 70%;">{{ event.name }}</h6>
                <span class="badge bg-warning text-dark p-1 shadow-sm" style="font-size: 0.75rem;">⭐ {{ event.rating }}</span>
            </div>
            <small class="text-primary fw-bold mb-2 d-block text-truncate">{{ event.genre|join(', ') }}</small>
            <small class="text-muted mb-3 d-block text-truncate"><i class="bi bi-geo-alt"></i> {{ event.area }}</small>
            <div class="mt-auto pt-2 d-flex justify-content-between align-items-center border-top">
                <span class="fw-bold fs-5 text-success">₹{{ event.price }}</span>
                <a href="{{ url_for('auth.checkout', event_id=event._id) }}" class="btn btn-sm btn-primary fw-bold px-3 {% if event.available_seats <= 0 %}disabled{% endif %}">
                    {{ 'Book' if event.available_seats > 0 else 'Sold Out' }}
                </a>
            </div>
        </div>
    </div>
</div>
